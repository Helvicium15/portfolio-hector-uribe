<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Héctor Uribe — Poster Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'"/>

  <style>
    :root {
      --serif: 'Instrument Serif', 'Times New Roman', serif;
      --sans:  'Inter', system-ui, sans-serif;
      --mono:  'JetBrains Mono', ui-monospace, monospace;
      --ink:   #ECE9E2;
      --dim:   rgba(236,233,226,0.48);
      --line:  rgba(236,233,226,0.1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #050506;
      color: var(--ink);
      font-family: var(--sans);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* grain */
    body::before {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none; z-index: 200;
      opacity: 0.03;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.85' numOctaves='2' seed='4'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
      mix-blend-mode: overlay;
    }

    #app {
      width: 100vw; height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .site-header {
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 48px;
      border-bottom: 1px solid var(--line);
      z-index: 20;
    }

    /* ── Body split ── */
    .body {
      flex: 1;
      min-height: 0;
      display: flex;
    }

    /* ── Left panel ── */
    .left-panel {
      flex-shrink: 0;
      width: 300px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 36px 40px 32px 48px;
      border-right: 1px solid var(--line);
    }

    .hero-title {
      font-family: var(--serif);
      font-size: clamp(36px, 3.8vw, 60px);
      line-height: 0.93;
      letter-spacing: -0.028em;
      font-weight: 400;
    }
    .hero-title em { font-style: italic; color: var(--dim); }

    /* ── Right panel ── */
    .right-panel {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    /* carousel takes all remaining height */
    .stage-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
      overflow: hidden;
    }

    /* side vignettes — fade out edge cards naturally */
    .stage-wrap::before,
    .stage-wrap::after {
      content: '';
      position: absolute; top: 0; bottom: 0;
      width: 220px; z-index: 30; pointer-events: none;
    }
    .stage-wrap::before { left:  0; background: linear-gradient(to right, #050506 0%, transparent 100%); }
    .stage-wrap::after  { right: 0; background: linear-gradient(to left,  #050506 0%, transparent 100%); }

    /* ── Bottom bar ── */
    .bottom-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 14px 40px 14px 48px;
      border-top: 1px solid var(--line);
    }

    /* arrow buttons */
    .arrow-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 180ms, border-color 180ms, color 180ms;
      backdrop-filter: blur(6px);
      flex-shrink: 0;
    }
    .arrow-btn:hover {
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.26);
      color: #fff;
    }

    /* nav */
    .nav-link {
      position: relative;
      color: var(--ink); text-decoration: none;
      font-family: var(--sans); font-size: 13px;
      font-weight: 400; letter-spacing: 0.01em;
      padding: 4px 0;
      transition: opacity 180ms;
    }
    .nav-link:hover { opacity: 0.6; }
    .nav-link.active::after {
      content: '';
      position: absolute; left: 0; bottom: 0;
      width: 100%; height: 1px;
      background: currentColor;
    }

    /* dots */
    .dot {
      height: 2px; border-radius: 1px;
      border: none; padding: 0; cursor: pointer;
      transition: all 240ms ease;
      background: rgba(236,233,226,0.18);
      width: 18px;
    }
    .dot.active { background: var(--ink); width: 32px; }
    .dot:hover  { background: rgba(236,233,226,0.4); }

    /* detail view */
    @keyframes dv-in  { from { opacity: 0 } to { opacity: 1 } }
    @keyframes dv-up  { from { opacity: 0; transform: translateY(18px) } to { opacity: 1; transform: translateY(0) } }

    .tweaks-panel {
      position: fixed; bottom: 20px; right: 20px; z-index: 500;
      background: rgba(12,12,14,0.95);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 18px 20px;
      width: 280px;
      box-shadow: 0 28px 56px rgba(0,0,0,0.55);
      font-family: var(--sans); font-size: 12px; color: var(--ink);
    }
    .tweak-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
    .tweak-row label {
      display: flex; justify-content: space-between;
      font-family: var(--mono); font-size: 10px;
      letter-spacing: 0.09em; text-transform: uppercase; color: var(--dim);
    }
    .tweak-row input[type="range"] { width: 100%; accent-color: #ECE9E2; }
    .tweak-toggle {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 0; border-top: 1px solid rgba(255,255,255,0.06);
      font-family: var(--mono); font-size: 10px;
      letter-spacing: 0.09em; text-transform: uppercase; color: var(--dim);
    }
  </style>
</head>
<body>
<div id="app"></div>

<script src="posters.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>

<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  /* ── Carousel ── */
  function CrateCarousel({ posters, activeIndex, setActiveIndex, onOpen, tweaks }) {
    const {
      spacingX = 240, spacingZ = 100, rotY = 34,
      scaleStep = 0.07, opacityStep = 0.13,
      perspective = 1700, cardW = 300, cardH = 413,
      maxVisible = 6,
    } = tweaks;

    const dragRef      = useRef(null);
    const [drag, setDrag] = useState(false);
    const wCool        = useRef(0);
    const n            = posters.length;
    const prev         = () => setActiveIndex(i => (i - 1 + n) % n);
    const next         = () => setActiveIndex(i => (i + 1) % n);

    useEffect(() => {
      const fn = e => { if (e.key === 'ArrowLeft') prev(); if (e.key === 'ArrowRight') next(); };
      window.addEventListener('keydown', fn);
      return () => window.removeEventListener('keydown', fn);
    }, [n]);

    const onWheel = e => {
      e.preventDefault();
      const now = Date.now();
      if (now - wCool.current < 300) return;
      wCool.current = now;
      const d = Math.abs(e.deltaX) > Math.abs(e.deltaY) ? e.deltaX : e.deltaY;
      d > 0 ? next() : prev();
    };

    const onPD = e => { dragRef.current = { x: e.clientX }; e.currentTarget.setPointerCapture(e.pointerId); };
    const onPM = e => { if (dragRef.current && Math.abs(e.clientX - dragRef.current.x) > 8) setDrag(true); };
    const onPU = e => {
      if (!dragRef.current) return;
      const dx = e.clientX - dragRef.current.x;
      if (Math.abs(dx) > 50) dx < 0 ? next() : prev();
      dragRef.current = null;
      setTimeout(() => setDrag(false), 50);
    };

    return (
      <div
        style={{ width: '100%', height: '100%', position: 'relative', userSelect: 'none', cursor: drag ? 'grabbing' : 'grab' }}
        onWheel={onWheel}
        onPointerDown={onPD} onPointerMove={onPM} onPointerUp={onPU} onPointerLeave={onPU}
      >
        {/* 3D scene */}
        <div style={{ position: 'absolute', inset: 0 }}>
          <div style={{ position: 'relative', width: '100%', height: '100%', perspective: `${perspective}px`, perspectiveOrigin: '50% 50%' }}>
            {posters.map((p, i) => {
              let d = i - activeIndex;
              const half = n / 2;
              if (d >  half) d -= n;
              if (d < -half) d += n;
              const absD = Math.abs(d);
              if (absD > maxVisible) return null;

              const isActive = i === activeIndex;
              const scale    = Math.max(0.28, 1 - absD * scaleStep);
              const opacity  = Math.max(0.04, 1 - absD * opacityStep);

              return (
                <div
                  key={p.id}
                  onClick={() => { if (!drag) isActive ? onOpen(p) : setActiveIndex(i); }}
                  style={{
                    position: 'absolute',
                    left: '50%', top: '50%',
                    width: cardW, height: cardH,
                    marginLeft: -cardW / 2 - 150, marginTop: -cardH / 2,
                    transform: `translateX(${d * spacingX}px) translateZ(${-absD * spacingZ}px) rotateY(${d * rotY}deg) scale(${scale})`,
                    opacity,
                    zIndex: maxVisible + 2 - absD,
                    transition: 'transform 480ms cubic-bezier(0.25,0.1,0.25,1), opacity 480ms ease, box-shadow 480ms ease',
                    cursor: isActive ? 'pointer' : 'default',
                    borderRadius: 9,
                    overflow: 'hidden',
                    boxShadow: isActive
                      ? '0 0 0 1px rgba(255,255,255,0.1), 0 32px 64px rgba(0,0,0,0.9), 0 0 120px rgba(0,0,0,0.6)'
                      : `0 8px 20px rgba(0,0,0,${0.25 + absD * 0.04})`,
                  }}
                >
                  <img src={p.src} alt={p.title} draggable={false}
                    style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block', pointerEvents: 'none' }}
                  />
                  {isActive && (
                    <>
                      {/* subtle top highlight line */}
                      <div style={{
                        position: 'absolute', top: 0, left: 0, right: 0, height: 1,
                        background: 'linear-gradient(to right, transparent, rgba(255,255,255,0.18), transparent)',
                        pointerEvents: 'none',
                      }}/>
                      {/* bottom scrim */}
                      <div style={{
                        position: 'absolute', bottom: 0, left: 0, right: 0, height: '30%',
                        background: 'linear-gradient(to top, rgba(0,0,0,0.35) 0%, transparent 100%)',
                        pointerEvents: 'none',
                      }}/>
                    </>
                  )}
                </div>
              );
            })}
          </div>
        </div>

        {/* arrows */}
        <button className="arrow-btn" aria-label="Previous" onClick={prev}
          style={{ position: 'absolute', left: 20, top: '50%', transform: 'translateY(-50%)', zIndex: 50 }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button className="arrow-btn" aria-label="Next" onClick={next}
          style={{ position: 'absolute', right: 20, top: '50%', transform: 'translateY(-50%)', zIndex: 50 }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </div>
    );
  }

  /* ── Detail view ── */
  function DetailView({ poster, onClose, onNext, onPrev }) {
    useEffect(() => {
      const fn = e => {
        if (e.key === 'Escape')     onClose();
        if (e.key === 'ArrowRight') onNext();
        if (e.key === 'ArrowLeft')  onPrev();
      };
      document.addEventListener('keydown', fn);
      return () => document.removeEventListener('keydown', fn);
    }, [onClose, onNext, onPrev]);

    return (
      <div
        onClick={e => { if (e.target === e.currentTarget) onClose(); }}
        style={{
          position: 'fixed', inset: 0, zIndex: 1000,
          background: 'rgba(5,5,6,0.93)',
          backdropFilter: 'blur(28px)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          padding: '40px 48px',
          animation: 'dv-in 260ms ease both',
        }}
      >
        {/* close */}
        <button onClick={onClose} aria-label="Close" style={{
          position: 'absolute', top: 24, right: 28,
          width: 42, height: 42, borderRadius: '50%',
          background: 'none', border: '1px solid rgba(255,255,255,0.15)',
          color: 'rgba(255,255,255,0.5)', cursor: 'pointer',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          transition: 'all 160ms',
        }}
        onMouseEnter={e => { e.currentTarget.style.background='rgba(255,255,255,0.07)'; e.currentTarget.style.color='#fff'; }}
        onMouseLeave={e => { e.currentTarget.style.background='none'; e.currentTarget.style.color='rgba(255,255,255,0.5)'; }}
        >
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>

        <div style={{
          display: 'grid', gridTemplateColumns: 'auto 1fr',
          gap: 64, maxWidth: 1060, width: '100%', alignItems: 'center',
          animation: 'dv-up 360ms ease both',
        }}>
          {/* image + nav arrows */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
            {[onPrev, onNext].map((fn, idx) => (
              <button key={idx} onClick={fn} aria-label={idx === 0 ? 'Prev' : 'Next'} style={{
                width: 38, height: 38, borderRadius: '50%', flexShrink: 0,
                background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.13)',
                color: 'rgba(255,255,255,0.58)', cursor: 'pointer',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                transition: 'all 160ms',
              }}
              onMouseEnter={e => { e.currentTarget.style.background='rgba(255,255,255,0.1)'; e.currentTarget.style.color='#fff'; }}
              onMouseLeave={e => { e.currentTarget.style.background='rgba(255,255,255,0.05)'; e.currentTarget.style.color='rgba(255,255,255,0.58)'; }}
              >
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                  {idx === 0 ? <polyline points="15 18 9 12 15 6"/> : <polyline points="9 18 15 12 9 6"/>}
                </svg>
              </button>
            ))}
            {/* the image sits between the two arrows via CSS order trick — place it after first arrow */}
          </div>

          {/* actually render image in correct slot */}
          <div style={{ display: 'contents' }}>
            <div style={{
              width: 320, height: 440, borderRadius: 9, overflow: 'hidden', flexShrink: 0,
              boxShadow: '0 56px 112px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.07)',
              gridColumn: 1, gridRow: 1,
            }}>
              <img src={poster.src} alt={poster.title}
                style={{ width: '100%', height: '100%', objectFit: 'cover', display: 'block' }}/>
            </div>
          </div>

          {/* info */}
          <div style={{ maxWidth: '44ch' }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.22em', color: 'var(--dim)', textTransform: 'uppercase', marginBottom: 16 }}>
              {poster.series} · {poster.year}
            </div>
            <h2 style={{ fontFamily: 'var(--serif)', fontSize: 'clamp(36px, 3.8vw, 54px)', lineHeight: 0.93, letterSpacing: '-0.028em', fontWeight: 400, margin: '0 0 26px' }}>
              {poster.title}
            </h2>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--dim)', marginBottom: 4 }}>Medium</div>
            <div style={{ fontFamily: 'var(--sans)', fontSize: 13, color: 'rgba(236,233,226,0.72)', marginBottom: 22 }}>{poster.medium}</div>
            <p style={{ fontFamily: 'var(--sans)', fontSize: 14, lineHeight: 1.68, color: 'rgba(236,233,226,0.65)', margin: '0 0 26px' }}>{poster.description}</p>
            <div style={{ display: 'flex', gap: 7, flexWrap: 'wrap', marginBottom: 36 }}>
              {poster.tags.map(t => (
                <span key={t} style={{
                  fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.12em', textTransform: 'uppercase',
                  padding: '5px 11px', border: '1px solid rgba(236,233,226,0.15)', borderRadius: 999, color: 'var(--dim)',
                }}>{t}</span>
              ))}
            </div>
            {poster.link && (
              <a href={poster.link} target="_blank" rel="noopener noreferrer" style={{
                display: 'inline-flex', alignItems: 'center', gap: 9,
                padding: '12px 22px', background: '#ECE9E2', color: '#111',
                borderRadius: 999, fontFamily: 'var(--mono)', fontSize: 11,
                letterSpacing: '0.14em', textTransform: 'uppercase', textDecoration: 'none',
                transition: 'transform 180ms',
              }}
              onMouseEnter={e => e.currentTarget.style.transform='translateY(-2px)'}
              onMouseLeave={e => e.currentTarget.style.transform='translateY(0)'}
              >
                View on Behance
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                  <polyline points="15 3 21 3 21 9"/>
                  <line x1="10" y1="14" x2="21" y2="3"/>
                </svg>
              </a>
            )}
          </div>
        </div>
      </div>
    );
  }

  /* ── Tweaks ── */
  function Slider({ label, value, min, max, step = 1, onChange }) {
    return (
      <div className="tweak-row">
        <label><span>{label}</span><span style={{ color: 'var(--ink)' }}>{value}</span></label>
        <input type="range" min={min} max={max} step={step} value={value} onChange={e => onChange(+e.target.value)}/>
      </div>
    );
  }
  function Toggle({ on, onChange }) {
    return (
      <button onClick={() => onChange(!on)} style={{
        width: 36, height: 19, borderRadius: 999, flexShrink: 0,
        background: on ? '#ECE9E2' : 'rgba(255,255,255,0.1)',
        border: 'none', cursor: 'pointer', position: 'relative', transition: 'background 180ms',
      }}>
        <span style={{ position: 'absolute', top: 2, left: on ? 19 : 2, width: 15, height: 15, borderRadius: 999, background: on ? '#111' : '#ECE9E2', transition: 'left 180ms' }}/>
      </button>
    );
  }
  function TweaksPanel({ tweaks, setTweak, onClose }) {
    return (
      <div className="tweaks-panel">
        <div style={{ fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.2em', textTransform: 'uppercase', color: 'var(--dim)', marginBottom: 14, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <span>Tweaks</span>
          <button onClick={onClose} style={{ background: 'none', border: 'none', color: 'var(--dim)', cursor: 'pointer', fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.1em', textTransform: 'uppercase', padding: 0 }}>close ×</button>
        </div>
        <Slider label="Tilt"        value={tweaks.rotY}        min={0}   max={60}   onChange={v => setTweak('rotY', v)}/>
        <Slider label="Spacing"     value={tweaks.spacingX}    min={140} max={320}  onChange={v => setTweak('spacingX', v)}/>
        <Slider label="Depth"       value={tweaks.spacingZ}    min={40}  max={200}  onChange={v => setTweak('spacingZ', v)}/>
        <Slider label="Perspective" value={tweaks.perspective} min={900} max={2800} step={50} onChange={v => setTweak('perspective', v)}/>
        <Slider label="Card size"   value={tweaks.cardW}       min={200} max={400}  step={10}
          onChange={v => { setTweak('cardW', v); setTweak('cardH', Math.round(v * 1.375)); }}/>
        <Slider label="Visible"     value={tweaks.maxVisible}  min={3}   max={10}   step={1}  onChange={v => setTweak('maxVisible', v)}/>
        <div className="tweak-toggle">
          <span>Auto-advance</span>
          <Toggle on={tweaks.autoAdvance} onChange={v => setTweak('autoAdvance', v)}/>
        </div>
      </div>
    );
  }

  /* ── App ── */
  const TWEAKS = { spacingX: 260, spacingZ: 100, rotY: 34, scaleStep: 0.07, opacityStep: 0.13, perspective: 1700, cardW: 380, cardH: 524, maxVisible: 6, autoAdvance: true };

  function App() {
    const [active, setActive] = useState(() => { try { return parseInt(localStorage.getItem('hu:poster') || '2') || 2; } catch { return 2; } });
    const [open,   setOpen]   = useState(null);
    const [tweaks, setTweaks] = useState(TWEAKS);
    const [tOpen,  setTOpen]  = useState(false);

    useEffect(() => { try { localStorage.setItem('hu:poster', String(active)); } catch {} }, [active]);
    const setTweak = (k, v) => setTweaks(t => ({ ...t, [k]: v }));

    useEffect(() => {
      if (!tweaks.autoAdvance || open) return;
      const id = setInterval(() => setActive(i => (i + 1) % POSTERS.length), 3400);
      return () => clearInterval(id);
    }, [tweaks.autoAdvance, open]);

    const openIdx = open ? POSTERS.findIndex(p => p.id === open.id) : -1;
    const poster  = POSTERS[active];

    return (
      <>
        {/* ── Header ── */}
        <header className="site-header">
          <a href="../Portafolio_v2/index.html" style={{ display: 'flex', alignItems: 'center', gap: 12, textDecoration: 'none', color: 'var(--ink)' }}>
            <span style={{ width: 36, height: 36, display: 'inline-flex', alignItems: 'center', justifyContent: 'center', border: '1.5px solid var(--ink)', fontFamily: 'var(--serif)', fontSize: 16, letterSpacing: '-0.02em', fontStyle: 'italic' }}>HU</span>
            <span style={{ fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.2em', color: 'var(--dim)', textTransform: 'uppercase' }}>Héctor Uribe — Posters</span>
          </a>
          <nav style={{ display: 'flex', gap: 32, alignItems: 'center' }}>
            <a className="nav-link" href="../Portafolio_v2/index.html">Work</a>
            <a className="nav-link active" href="#">Posters</a>
            <a className="nav-link" href="mailto:hectoruch18@gmail.com">Contact</a>
            <button onClick={() => setTOpen(o => !o)} style={{
              background: 'none', border: '1px solid rgba(236,233,226,0.16)', color: 'var(--dim)',
              padding: '5px 13px', borderRadius: 999, cursor: 'pointer',
              fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase',
              transition: 'all 160ms',
            }}
            onMouseEnter={e => { e.currentTarget.style.borderColor='rgba(236,233,226,0.38)'; e.currentTarget.style.color='var(--ink)'; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor='rgba(236,233,226,0.16)'; e.currentTarget.style.color='var(--dim)'; }}
            >⌥ Tweaks</button>
          </nav>
        </header>

        {/* ── Body ── */}
        <div className="body">

          {/* Left panel */}
          <aside className="left-panel">
            {/* top: vol + title */}
            <div>
              <div style={{ fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.22em', color: 'var(--dim)', textTransform: 'uppercase', marginBottom: 18, display: 'flex', gap: 14, alignItems: 'center' }}>
                <span>Vol. 01</span>
                <span style={{ width: 14, height: 1, background: 'currentColor', opacity: 0.4 }}/>
                <span>2022–2025</span>
              </div>
              <h1 className="hero-title">
                Posters,<br/>
                pulled from<br/>
                the <em>crate.</em>
              </h1>
            </div>

            {/* bottom: active poster meta + CTA */}
            <div>
              <p style={{ fontFamily: 'var(--sans)', fontSize: 12, lineHeight: 1.6, color: 'rgba(236,233,226,0.52)', marginBottom: 16 }}>
                Archive of print & screen work — 3D renders, photographs, and typographic experiments made between Mainz and Mexico City.
              </p>
              <div style={{ fontFamily: 'var(--mono)', fontSize: 9, letterSpacing: '0.2em', color: 'var(--dim)', textTransform: 'uppercase', marginBottom: 7 }}>
                Now showing · {poster.series}
              </div>
              <div style={{ fontFamily: 'var(--serif)', fontSize: 'clamp(20px, 2vw, 28px)', lineHeight: 1.0, letterSpacing: '-0.02em', marginBottom: 18 }}>
                {poster.title}
              </div>
              <button
                onClick={() => setOpen(poster)}
                style={{
                  display: 'inline-flex', alignItems: 'center', gap: 9,
                  padding: '11px 20px',
                  background: '#ECE9E2', color: '#111',
                  border: 'none', borderRadius: 999,
                  fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.14em',
                  textTransform: 'uppercase', cursor: 'pointer',
                  transition: 'transform 180ms',
                }}
                onMouseEnter={e => e.currentTarget.style.transform='translateY(-2px)'}
                onMouseLeave={e => e.currentTarget.style.transform='translateY(0)'}
              >
                Pull from crate
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                  <path d="M2 6h8M6 2l4 4-4 4" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </button>
            </div>
          </aside>

          {/* Right panel: carousel + bottom bar */}
          <div className="right-panel">

            {/* carousel */}
            <div className="stage-wrap">
              <CrateCarousel
                posters={POSTERS}
                activeIndex={active}
                setActiveIndex={setActive}
                onOpen={p => setOpen(p)}
                tweaks={tweaks}
              />
            </div>

            {/* bottom bar: dots + counter */}
            <div className="bottom-bar">
              <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
                {POSTERS.map((_, i) => (
                  <button key={i} className={`dot${i === active ? ' active' : ''}`} onClick={() => setActive(i)} aria-label={`Poster ${i + 1}`}/>
                ))}
              </div>
              <div style={{ fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: '0.18em', color: 'var(--dim)', textTransform: 'uppercase', flexShrink: 0 }}>
                {String(active + 1).padStart(2,'0')} / {String(POSTERS.length).padStart(2,'0')} · {poster.year}
              </div>
            </div>

          </div>
        </div>

        {/* ── Detail overlay ── */}
        {open && (
          <DetailView
            poster={open}
            onClose={() => setOpen(null)}
            onNext={() => { const i = (openIdx + 1) % POSTERS.length; setActive(i); setOpen(POSTERS[i]); }}
            onPrev={() => { const i = (openIdx - 1 + POSTERS.length) % POSTERS.length; setActive(i); setOpen(POSTERS[i]); }}
          />
        )}

        {tOpen && <TweaksPanel tweaks={tweaks} setTweak={setTweak} onClose={() => setTOpen(false)}/>}
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
